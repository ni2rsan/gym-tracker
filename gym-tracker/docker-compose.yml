version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymuser
      POSTGRES_PASSWORD: gympass
      POSTGRES_DB: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymuser -d gymtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
